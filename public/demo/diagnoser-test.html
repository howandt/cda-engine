<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diagnoser API Test - CDA/CDT System</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            margin-bottom: 30px;
            text-align: center;
        }

        .header h1 {
            color: #667eea;
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .header p {
            color: #666;
            font-size: 1.1em;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
            text-align: center;
        }

        .stat-card .number {
            font-size: 3em;
            font-weight: bold;
            color: #667eea;
            margin-bottom: 10px;
        }

        .stat-card .label {
            color: #666;
            font-size: 1.1em;
        }

        .search-box {
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
            margin-bottom: 30px;
        }

        .search-box h2 {
            color: #667eea;
            margin-bottom: 20px;
        }

        .search-controls {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }

        input, select, button {
            padding: 12px 20px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1em;
            outline: none;
            transition: all 0.3s;
        }

        input:focus, select:focus {
            border-color: #667eea;
        }

        input {
            flex: 1;
            min-width: 200px;
        }

        select {
            min-width: 200px;
        }

        button {
            background: #667eea;
            color: white;
            border: none;
            cursor: pointer;
            font-weight: bold;
            padding: 12px 30px;
        }

        button:hover {
            background: #5568d3;
            transform: translateY(-2px);
        }

        .results {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px;
        }

        .diagnose-card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
            transition: transform 0.3s;
            cursor: pointer;
        }

        .diagnose-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
        }

        .diagnose-card h3 {
            color: #667eea;
            font-size: 1.5em;
            margin-bottom: 10px;
        }

        .diagnose-card .full-name {
            color: #999;
            font-size: 0.9em;
            margin-bottom: 15px;
        }

        .diagnose-card .info {
            margin-bottom: 15px;
        }

        .diagnose-card .info-label {
            font-weight: bold;
            color: #333;
            display: inline-block;
            margin-right: 5px;
        }

        .symptom-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 15px;
        }

        .tag {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 5px 12px;
            border-radius: 15px;
            font-size: 0.85em;
            color: white;
        }

        .loading {
            text-align: center;
            padding: 50px;
            color: white;
            font-size: 1.5em;
        }

        .error {
            background: #ff6b6b;
            color: white;
            padding: 20px;
            border-radius: 10px;
            margin: 20px 0;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.8);
            z-index: 1000;
            overflow-y: auto;
            padding: 20px;
        }

        .modal-content {
            background: white;
            max-width: 900px;
            margin: 50px auto;
            border-radius: 15px;
            padding: 40px;
            position: relative;
        }

        .modal-close {
            position: absolute;
            top: 20px;
            right: 20px;
            font-size: 2em;
            cursor: pointer;
            color: #999;
        }

        .modal-close:hover {
            color: #667eea;
        }

        .markdown-content {
            line-height: 1.8;
            color: #333;
        }

        .markdown-content p {
            margin: 0 0 15px 0;
            text-align: left;
        }

        .markdown-content h1 {
            color: #667eea;
            margin: 30px 0 15px 0;
            text-align: left;
        }

        .markdown-content h2 {
            color: #764ba2;
            margin: 25px 0 12px 0;
            text-align: left;
        }

        .markdown-content h3 {
            color: #667eea;
            margin: 20px 0 10px 0;
            text-align: left;
        }

        .markdown-content ul, .markdown-content ol {
            margin: 0 0 15px 20px;
            padding-left: 0;
        }

        .markdown-content li {
            margin-bottom: 8px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🏥 Diagnoser API Test</h1>
            <p>CDA/CDT System - 15 Diagnoser med Fuld Dokumentation</p>
            <p style="margin-top: 10px; color: #999;">Hans' 9000+ timers arbejde 💙</p>
        </div>

        <div class="stats" id="stats">
            <div class="stat-card">
                <div class="number" id="totalCount">-</div>
                <div class="label">Total Diagnoser</div>
            </div>
            <div class="stat-card">
                <div class="number" id="filteredCount">-</div>
                <div class="label">Viste Diagnoser</div>
            </div>
            <div class="stat-card">
                <div class="number" id="kategorier">-</div>
                <div class="label">Kategorier</div>
            </div>
        </div>

        <div class="search-box">
            <h2>🔍 Søg og Filtrer</h2>
            <div class="search-controls">
                <input type="text" id="searchInput" placeholder="Søg i diagnoser, symptomer, nøgleord...">
                
                <select id="kategoriFilter">
                    <option value="">Alle Kategorier</option>
                </select>
                
                <select id="diagnoseSelect">
                    <option value="">Vælg Specifik Diagnose</option>
                </select>
                
                <button onclick="search()">Søg</button>
                <button onclick="reset()">Nulstil</button>
            </div>
        </div>

        <div id="loading" class="loading">
            Henter diagnoser...
        </div>

        <div id="error" style="display: none;"></div>

        <div id="results" class="results"></div>
    </div>

    <div id="modal" class="modal">
        <div class="modal-content">
            <span class="modal-close" onclick="closeModal()">&times;</span>
            <div id="modalContent"></div>
        </div>
    </div>

    <script>
        const API_BASE = 'https://cda-engine-clean.vercel.app/api/diagnoser';
        let allData = null;

        // Load initial data
        async function loadData() {
            try {
                const response = await fetch(API_BASE);
                if (!response.ok) throw new Error('API fejl');
                
                const data = await response.json();
                allData = data;
                
                // Update stats
                document.getElementById('totalCount').textContent = data.total_diagnoser;
                document.getElementById('filteredCount').textContent = data.filtered_count;
                
                // Get unique categories
                const categories = [...new Set(data.diagnoser.map(d => d.kategori))];
                document.getElementById('kategorier').textContent = categories.length;
                
                // Populate filters
                populateFilters(data.diagnoser, categories);
                
                // Display results
                displayResults(data.diagnoser);
                
                document.getElementById('loading').style.display = 'none';
                
            } catch (error) {
                document.getElementById('loading').style.display = 'none';
                document.getElementById('error').style.display = 'block';
                document.getElementById('error').className = 'error';
                document.getElementById('error').textContent = 'Fejl ved hentning af data: ' + error.message;
            }
        }

        function populateFilters(diagnoser, categories) {
            const kategoriSelect = document.getElementById('kategoriFilter');
            categories.sort().forEach(cat => {
                const option = document.createElement('option');
                option.value = cat;
                option.textContent = cat.replace(/_/g, ' ');
                kategoriSelect.appendChild(option);
            });

            const diagnoseSelect = document.getElementById('diagnoseSelect');
            diagnoser.sort((a, b) => a.navn.localeCompare(b.navn)).forEach(d => {
                const option = document.createElement('option');
                option.value = d.id;
                option.textContent = d.navn;
                diagnoseSelect.appendChild(option);
            });
        }

        async function search() {
            const searchTerm = document.getElementById('searchInput').value;
            const kategori = document.getElementById('kategoriFilter').value;
            const diagnoseId = document.getElementById('diagnoseSelect').value;

            let url = API_BASE;
            const params = [];
            
            if (diagnoseId) params.push(`id=${diagnoseId}`);
            if (kategori) params.push(`kategori=${encodeURIComponent(kategori)}`);
            if (searchTerm) params.push(`search=${encodeURIComponent(searchTerm)}`);
            
            if (params.length > 0) {
                url += '?' + params.join('&');
            }

            try {
                document.getElementById('loading').style.display = 'block';
                document.getElementById('results').innerHTML = '';
                
                const response = await fetch(url);
                const data = await response.json();
                
                document.getElementById('filteredCount').textContent = data.filtered_count || (data.diagnose ? 1 : 0);
                
                const diagnoser = data.diagnose ? [data.diagnose] : data.diagnoser;
                displayResults(diagnoser);
                
                document.getElementById('loading').style.display = 'none';
                
            } catch (error) {
                document.getElementById('loading').style.display = 'none';
                alert('Fejl ved søgning: ' + error.message);
            }
        }

        function displayResults(diagnoser) {
            const resultsDiv = document.getElementById('results');
            resultsDiv.innerHTML = '';

            if (!diagnoser || diagnoser.length === 0) {
                resultsDiv.innerHTML = '<p style="color: white; text-align: center; grid-column: 1/-1;">Ingen diagnoser fundet</p>';
                return;
            }

            diagnoser.forEach(diagnose => {
                const card = document.createElement('div');
                card.className = 'diagnose-card';
                card.onclick = () => showDetails(diagnose);
                
                card.innerHTML = `
                    <h3>${diagnose.navn}</h3>
                    <div class="full-name">${diagnose.fuld_navn}</div>
                    
                    <div class="info">
                        <span class="info-label">ICD-10:</span> ${diagnose.icd10}
                    </div>
                    
                    <div class="info">
                        <span class="info-label">Kategori:</span> ${diagnose.kategori.replace(/_/g, ' ')}
                    </div>
                    
                    <div class="info">
                        <span class="info-label">Prævalens:</span> ${diagnose.praevalens}
                    </div>
                    
                    <div class="symptom-tags">
                        ${diagnose.hovedsymptomer.slice(0, 4).map(s => 
                            `<span class="tag">${s.replace(/_/g, ' ')}</span>`
                        ).join('')}
                        ${diagnose.hovedsymptomer.length > 4 ? '<span class="tag">+' + (diagnose.hovedsymptomer.length - 4) + ' mere</span>' : ''}
                    </div>
                `;
                
                resultsDiv.appendChild(card);
            });
        }

        function showDetails(diagnose) {
            const modal = document.getElementById('modal');
            const content = document.getElementById('modalContent');
            
            // Convert markdown \n to <br>
            const markdownHtml = diagnose.indhold_markdown
                .replace(/\n\n/g, '</p><p>')
                .replace(/\n/g, '<br>')
                .replace(/### (.*?)(<br>|<\/p>)/g, '<h3>$1</h3>')
                .replace(/## (.*?)(<br>|<\/p>)/g, '<h2>$1</h2>')
                .replace(/# (.*?)(<br>|<\/p>)/g, '<h1>$1</h1>')
                .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
                .replace(/\*(.*?)\*/g, '<em>$1</em>');
            
            content.innerHTML = `
                <h1 style="color: #667eea; margin-bottom: 20px;">${diagnose.navn}</h1>
                <div class="markdown-content">
                    <p>${markdownHtml}</p>
                </div>
            `;
            
            modal.style.display = 'block';
        }

        function closeModal() {
            document.getElementById('modal').style.display = 'none';
        }

        function reset() {
            document.getElementById('searchInput').value = '';
            document.getElementById('kategoriFilter').value = '';
            document.getElementById('diagnoseSelect').value = '';
            loadData();
        }

        // Close modal on outside click
        window.onclick = function(event) {
            const modal = document.getElementById('modal');
            if (event.target == modal) {
                modal.style.display = 'none';
            }
        }

        // Load data on page load
        loadData();
    </script>
</body>
</html>
