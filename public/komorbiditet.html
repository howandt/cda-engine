<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Komorbiditet Test - CDA System</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #d84315 0%, #ff6f00 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
            padding: 20px;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .header p {
            font-size: 1.2em;
            opacity: 0.95;
        }

        .search-box {
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            margin-bottom: 30px;
        }

        .search-input {
            width: 100%;
            padding: 15px 20px;
            font-size: 1.1em;
            border: 2px solid #ddd;
            border-radius: 10px;
            transition: all 0.3s;
        }

        .search-input:focus {
            outline: none;
            border-color: #d84315;
            box-shadow: 0 0 0 3px rgba(216, 67, 21, 0.1);
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            text-align: center;
        }

        .stat-number {
            font-size: 2.5em;
            font-weight: bold;
            background: linear-gradient(135deg, #d84315, #ff6f00);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .stat-label {
            color: #666;
            margin-top: 5px;
            font-size: 0.9em;
        }

        .diagnoser-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .diagnose-card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            cursor: pointer;
            transition: all 0.3s;
        }

        .diagnose-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }

        .diagnose-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 15px;
        }

        .diagnose-icon {
            font-size: 2em;
        }

        .diagnose-title {
            font-size: 1.3em;
            font-weight: bold;
            color: #333;
        }

        .komorbid-count {
            background: linear-gradient(135deg, #d84315, #ff6f00);
            color: white;
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 0.9em;
            font-weight: bold;
            display: inline-block;
            margin-top: 10px;
        }

        .loading {
            text-align: center;
            color: white;
            font-size: 1.5em;
            padding: 50px;
        }

        .error {
            background: white;
            border-radius: 15px;
            padding: 30px;
            text-align: center;
            color: #d84315;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        /* Modal Styles */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            z-index: 1000;
            padding: 20px;
            overflow-y: auto;
        }

        .modal.active {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            background: white;
            border-radius: 20px;
            padding: 40px;
            max-width: 800px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            position: relative;
            box-shadow: 0 20px 60px rgba(0,0,0,0.4);
        }

        .modal-close {
            position: absolute;
            top: 20px;
            right: 20px;
            font-size: 2em;
            cursor: pointer;
            color: #666;
            background: none;
            border: none;
            transition: color 0.3s;
        }

        .modal-close:hover {
            color: #d84315;
        }

        .modal-header {
            margin-bottom: 30px;
        }

        .modal-title {
            font-size: 2em;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #d84315, #ff6f00);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .modal-description {
            color: #666;
            font-size: 1.1em;
            line-height: 1.6;
        }

        .komorbid-list {
            margin-top: 30px;
        }

        .komorbid-item {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 15px;
            border-left: 4px solid #d84315;
        }

        .komorbid-item-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .komorbid-name {
            font-size: 1.2em;
            font-weight: bold;
            color: #333;
        }

        .komorbid-percentage {
            background: linear-gradient(135deg, #d84315, #ff6f00);
            color: white;
            padding: 5px 12px;
            border-radius: 15px;
            font-weight: bold;
        }

        .komorbid-description {
            color: #666;
            line-height: 1.6;
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 2em;
            }

            .diagnoser-grid {
                grid-template-columns: 1fr;
            }

            .modal-content {
                padding: 30px 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🔗 Komorbiditet Test</h1>
            <p>Udforsk sammenhænge mellem diagnoser</p>
        </div>

        <div class="search-box">
            <input 
                type="text" 
                class="search-input" 
                id="searchInput" 
                placeholder="🔍 Søg efter diagnose..."
            >
        </div>

        <div class="stats" id="stats"></div>

        <div id="loading" class="loading">
            <div>⏳ Henter komorbiditet data...</div>
        </div>

        <div id="error" class="error" style="display: none;"></div>

        <div class="diagnoser-grid" id="diagnoserGrid"></div>
    </div>

    <!-- Modal -->
    <div class="modal" id="modal">
        <div class="modal-content">
            <button class="modal-close" onclick="closeModal()">×</button>
            <div class="modal-header">
                <h2 class="modal-title" id="modalTitle"></h2>
                <p class="modal-description" id="modalDescription"></p>
            </div>
            <div class="komorbid-list" id="modalContent"></div>
        </div>
    </div>

    <script>
        const API_URL = 'https://cda-engine-clean.vercel.app/api/komorbiditet';
        let allData = [];
        let filteredData = [];

        // Fetch data
        async function fetchData() {
            try {
                const response = await fetch(API_URL);
                if (!response.ok) throw new Error('Kunne ikke hente data');
                
                const result = await response.json();
                allData = result.data || [];
                filteredData = allData;
                
                document.getElementById('loading').style.display = 'none';
                renderStats();
                renderDiagnoser();
            } catch (error) {
                document.getElementById('loading').style.display = 'none';
                document.getElementById('error').style.display = 'block';
                document.getElementById('error').innerHTML = `
                    <h2>⚠️ Fejl</h2>
                    <p>${error.message}</p>
                    <p style="margin-top: 15px; color: #666;">
                        <small>API: ${API_URL}</small>
                    </p>
                `;
            }
        }

        // Render statistics
        function renderStats() {
            const totalDiagnoser = allData.length;
            const totalKomorbid = allData.reduce((sum, d) => sum + d.comorbid_conditions.length, 0);
            const avgKomorbid = totalDiagnoser > 0 ? (totalKomorbid / totalDiagnoser).toFixed(1) : 0;

            document.getElementById('stats').innerHTML = `
                <div class="stat-card">
                    <div class="stat-number">${totalDiagnoser}</div>
                    <div class="stat-label">Diagnoser</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number">${totalKomorbid}</div>
                    <div class="stat-label">Komorbide forbindelser</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number">${avgKomorbid}</div>
                    <div class="stat-label">Gns. pr. diagnose</div>
                </div>
            `;
        }

        // Render diagnoser
        function renderDiagnoser() {
            const grid = document.getElementById('diagnoserGrid');
            
            if (filteredData.length === 0) {
                grid.innerHTML = `
                    <div class="error">
                        <h3>🔍 Ingen resultater</h3>
                        <p>Prøv en anden søgning</p>
                    </div>
                `;
                return;
            }

            grid.innerHTML = filteredData.map(diagnose => `
                <div class="diagnose-card" onclick="showModal('${diagnose.id}')">
                    <div class="diagnose-header">
                        <span class="diagnose-icon">🔗</span>
                        <span class="diagnose-title">${diagnose.primary_diagnosis}</span>
                    </div>
                    <div class="komorbid-count">
                        ${diagnose.comorbid_conditions.length} komorbide tilstande
                    </div>
                </div>
            `).join('');
        }

        // Search functionality
        document.getElementById('searchInput').addEventListener('input', (e) => {
            const searchTerm = e.target.value.toLowerCase();
            
            filteredData = allData.filter(diagnose => 
                diagnose.primary_diagnosis.toLowerCase().includes(searchTerm) ||
                diagnose.comorbid_conditions.some(c => 
                    c.condition.toLowerCase().includes(searchTerm)
                )
            );
            
            renderDiagnoser();
        });

        // Show modal
        function showModal(id) {
            const diagnose = allData.find(d => d.id === id);
            if (!diagnose) return;

            document.getElementById('modalTitle').textContent = diagnose.primary_diagnosis;
            document.getElementById('modalDescription').textContent = diagnose.description;

            const content = diagnose.comorbid_conditions
                .sort((a, b) => parseFloat(b.percentage) - parseFloat(a.percentage))
                .map(condition => `
                    <div class="komorbid-item">
                        <div class="komorbid-item-header">
                            <span class="komorbid-name">${condition.condition}</span>
                            <span class="komorbid-percentage">${condition.percentage}</span>
                        </div>
                        <div class="komorbid-description">${condition.description}</div>
                    </div>
                `).join('');

            document.getElementById('modalContent').innerHTML = content;
            document.getElementById('modal').classList.add('active');
        }

        // Close modal
        function closeModal() {
            document.getElementById('modal').classList.remove('active');
        }

        // Close modal on background click
        document.getElementById('modal').addEventListener('click', (e) => {
            if (e.target.id === 'modal') {
                closeModal();
            }
        });

        // Close modal on ESC key
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                closeModal();
            }
        });

        // Initialize
        fetchData();
    </script>
</body>
</html>
