<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📝 Templates Test - CDA System</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        header p {
            font-size: 1.2em;
            opacity: 0.95;
        }

        .controls {
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
            margin-bottom: 30px;
        }

        .search-box {
            width: 100%;
            padding: 15px;
            font-size: 16px;
            border: 2px solid #667eea;
            border-radius: 10px;
            margin-bottom: 15px;
            transition: border-color 0.3s;
        }

        .search-box:focus {
            outline: none;
            border-color: #764ba2;
        }

        .filter-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 15px;
        }

        .filter-btn {
            padding: 10px 20px;
            border: none;
            border-radius: 25px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .filter-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(118, 75, 162, 0.4);
        }

        .filter-btn.active {
            background: linear-gradient(135deg, #764ba2 0%, #667eea 100%);
            box-shadow: 0 4px 12px rgba(118, 75, 162, 0.6);
        }

        .stats {
            display: flex;
            justify-content: space-around;
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .stat-card {
            background: white;
            padding: 20px 30px;
            border-radius: 15px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
            text-align: center;
            flex: 1;
            min-width: 150px;
        }

        .stat-number {
            font-size: 2.5em;
            font-weight: bold;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .stat-label {
            color: #666;
            margin-top: 5px;
            font-size: 0.9em;
        }

        .templates-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .template-card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
            cursor: pointer;
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .template-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 40px rgba(118, 75, 162, 0.3);
        }

        .template-title {
            font-size: 1.3em;
            font-weight: bold;
            color: #333;
            margin-bottom: 10px;
        }

        .template-type {
            display: inline-block;
            padding: 5px 15px;
            border-radius: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            font-size: 0.85em;
            font-weight: 600;
            margin-bottom: 15px;
        }

        .template-description {
            color: #666;
            line-height: 1.6;
            margin-bottom: 15px;
        }

        .template-meta {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            font-size: 0.9em;
            color: #888;
        }

        .template-meta span {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        /* Modal Styles */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            z-index: 1000;
            overflow-y: auto;
            padding: 20px;
        }

        .modal.active {
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding-top: 50px;
        }

        .modal-content {
            background: white;
            border-radius: 20px;
            padding: 40px;
            max-width: 800px;
            width: 100%;
            position: relative;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        .modal-close {
            position: absolute;
            top: 20px;
            right: 20px;
            font-size: 30px;
            cursor: pointer;
            color: #999;
            background: none;
            border: none;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            transition: background 0.3s;
        }

        .modal-close:hover {
            background: #f0f0f0;
            color: #333;
        }

        .modal-header {
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid #f0f0f0;
        }

        .modal-title {
            font-size: 2em;
            color: #333;
            margin-bottom: 15px;
        }

        .modal-type {
            display: inline-block;
            padding: 8px 20px;
            border-radius: 25px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            font-weight: 600;
        }

        .modal-section {
            margin-bottom: 25px;
        }

        .modal-section h3 {
            color: #333;
            margin-bottom: 12px;
            font-size: 1.3em;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .modal-section p, .modal-section ul {
            color: #666;
            line-height: 1.8;
        }

        .modal-section ul {
            padding-left: 20px;
        }

        .modal-section li {
            margin-bottom: 8px;
        }

        .loading {
            text-align: center;
            padding: 50px;
            color: white;
            font-size: 1.5em;
        }

        .error {
            background: white;
            padding: 30px;
            border-radius: 15px;
            text-align: center;
            color: #d32f2f;
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
        }

        .no-results {
            text-align: center;
            padding: 50px;
            background: white;
            border-radius: 15px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
        }

        .no-results h3 {
            color: #333;
            margin-bottom: 10px;
        }

        .no-results p {
            color: #666;
        }

        @media (max-width: 768px) {
            header h1 {
                font-size: 2em;
            }

            .templates-grid {
                grid-template-columns: 1fr;
            }

            .modal-content {
                padding: 25px;
            }

            .modal-title {
                font-size: 1.5em;
            }

            .stats {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📝 Templates Test</h1>
            <p>CDA System - Skabelon Bibliotek</p>
        </header>

        <div class="stats" id="stats">
            <div class="stat-card">
                <div class="stat-number" id="totalCount">-</div>
                <div class="stat-label">Total Templates</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="categoryCount">-</div>
                <div class="stat-label">Kategorier</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="shownCount">-</div>
                <div class="stat-label">Viste Templates</div>
            </div>
        </div>

        <div class="controls">
            <input 
                type="text" 
                class="search-box" 
                id="searchBox" 
                placeholder="🔍 Søg i templates (titel, beskrivelse, formål...)">
            
            <div class="filter-buttons" id="filterButtons">
                <button class="filter-btn active" data-filter="all">📋 Alle</button>
            </div>
        </div>

        <div id="content">
            <div class="loading">
                Henter templates... ⏳
            </div>
        </div>
    </div>

    <!-- Modal -->
    <div class="modal" id="modal">
        <div class="modal-content">
            <button class="modal-close" onclick="closeModal()">&times;</button>
            <div id="modalBody"></div>
        </div>
    </div>

    <script>
        const API_URL = 'https://cda-engine-clean.vercel.app/api/templates';
        let allTemplates = [];
        let currentFilter = 'all';

        // Hent templates fra API
        async function loadTemplates() {
            try {
                const response = await fetch(API_URL);
                const data = await response.json();
                
                if (data.success && data.templates) {
                    allTemplates = data.templates;
                    setupFilters();
                    updateStats();
                    displayTemplates(allTemplates);
                } else {
                    throw new Error('Kunne ikke hente templates');
                }
            } catch (error) {
                console.error('Fejl:', error);
                document.getElementById('content').innerHTML = `
                    <div class="error">
                        <h3>❌ Fejl ved indlæsning</h3>
                        <p>${error.message}</p>
                    </div>
                `;
            }
        }

        // Setup filter knapper
        function setupFilters() {
            const types = [...new Set(allTemplates.map(t => t.type))];
            const filterButtons = document.getElementById('filterButtons');
            
            types.forEach(type => {
                const btn = document.createElement('button');
                btn.className = 'filter-btn';
                btn.setAttribute('data-filter', type);
                btn.textContent = getTypeIcon(type) + ' ' + type;
                btn.onclick = () => filterTemplates(type);
                filterButtons.appendChild(btn);
            });
        }

        // Get icon for type
        function getTypeIcon(type) {
            const icons = {
                'Observation': '👁️',
                'Vurdering': '📊',
                'Lektieplan': '📚',
                'Evaluering': '✅',
                'Kommunikation': '💬',
                'Handlingsplan': '🎯',
                'Møde': '🤝',
                'Rapport': '📄'
            };
            return icons[type] || '📝';
        }

        // Filter templates
        function filterTemplates(filter) {
            currentFilter = filter;
            
            // Update button states
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.remove('active');
                if (btn.getAttribute('data-filter') === filter) {
                    btn.classList.add('active');
                }
            });

            applyFilters();
        }

        // Apply all filters
        function applyFilters() {
            let filtered = allTemplates;

            // Type filter
            if (currentFilter !== 'all') {
                filtered = filtered.filter(t => t.type === currentFilter);
            }

            // Search filter
            const searchTerm = document.getElementById('searchBox').value.toLowerCase();
            if (searchTerm) {
                filtered = filtered.filter(t => 
                    t.title.toLowerCase().includes(searchTerm) ||
                    t.description.toLowerCase().includes(searchTerm) ||
                    t.purpose.toLowerCase().includes(searchTerm) ||
                    (t.target_group && t.target_group.toLowerCase().includes(searchTerm))
                );
            }

            displayTemplates(filtered);
            updateShownCount(filtered.length);
        }

        // Display templates
        function displayTemplates(templates) {
            const content = document.getElementById('content');

            if (templates.length === 0) {
                content.innerHTML = `
                    <div class="no-results">
                        <h3>Ingen templates fundet</h3>
                        <p>Prøv en anden søgning eller filter</p>
                    </div>
                `;
                return;
            }

            const grid = document.createElement('div');
            grid.className = 'templates-grid';

            templates.forEach(template => {
                const card = createTemplateCard(template);
                grid.appendChild(card);
            });

            content.innerHTML = '';
            content.appendChild(grid);
        }

        // Create template card
        function createTemplateCard(template) {
            const card = document.createElement('div');
            card.className = 'template-card';
            card.onclick = () => openModal(template);

            const hasFields = template.fields && template.fields.length > 0;
            const fieldCount = hasFields ? template.fields.length : 0;

            card.innerHTML = `
                <div class="template-title">${template.title}</div>
                <div class="template-type">${getTypeIcon(template.type)} ${template.type}</div>
                <div class="template-description">${template.description}</div>
                <div class="template-meta">
                    <span>🎯 ${template.target_group || 'Alle'}</span>
                    ${fieldCount > 0 ? `<span>📋 ${fieldCount} felter</span>` : ''}
                </div>
            `;

            return card;
        }

        // Open modal
        function openModal(template) {
            const modal = document.getElementById('modal');
            const modalBody = document.getElementById('modalBody');

            let fieldsHTML = '';
            if (template.fields && template.fields.length > 0) {
                fieldsHTML = `
                    <div class="modal-section">
                        <h3>📋 Felter i skabelonen</h3>
                        <ul>
                            ${template.fields.map(field => `
                                <li><strong>${field.label}:</strong> ${field.description}</li>
                            `).join('')}
                        </ul>
                    </div>
                `;
            }

            modalBody.innerHTML = `
                <div class="modal-header">
                    <h2 class="modal-title">${template.title}</h2>
                    <span class="modal-type">${getTypeIcon(template.type)} ${template.type}</span>
                </div>

                <div class="modal-section">
                    <h3>📝 Beskrivelse</h3>
                    <p>${template.description}</p>
                </div>

                <div class="modal-section">
                    <h3>🎯 Formål</h3>
                    <p>${template.purpose}</p>
                </div>

                ${fieldsHTML}

                <div class="modal-section">
                    <h3>👥 Målgruppe</h3>
                    <p>${template.target_group || 'Alle'}</p>
                </div>
            `;

            modal.classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        // Close modal
        function closeModal() {
            const modal = document.getElementById('modal');
            modal.classList.remove('active');
            document.body.style.overflow = '';
        }

        // Update stats
        function updateStats() {
            document.getElementById('totalCount').textContent = allTemplates.length;
            
            const types = new Set(allTemplates.map(t => t.type));
            document.getElementById('categoryCount').textContent = types.size;
            
            updateShownCount(allTemplates.length);
        }

        function updateShownCount(count) {
            document.getElementById('shownCount').textContent = count;
        }

        // Search handler
        document.getElementById('searchBox').addEventListener('input', () => {
            applyFilters();
        });

        // Close modal on outside click
        document.getElementById('modal').addEventListener('click', (e) => {
            if (e.target.id === 'modal') {
                closeModal();
            }
        });

        // Close modal on Escape key
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                closeModal();
            }
        });

        // Load templates on page load
        loadTemplates();
    </script>
</body>
</html>
