<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta
    name="description"
    content="CDA – praksisnær støtte til lærere, pædagoger og fagpersoner."
  />
  <title>CDA Chat | CDAI Systems</title>

  <style>
    :root {
      --bg: #eef3f8;
      --surface: #ffffff;
      --surface-soft: #f5f8fc;
      --text: #17243a;
      --muted: #68778b;
      --line: #dce5ef;
      --primary: #3157d5;
      --primary-dark: #203fa8;
      --secondary: #0d7b72;
      --user-bubble: #3157d5;
      --assistant-bubble: #ffffff;
      --danger: #b42318;
      --danger-bg: #fff1f0;
      --shadow: 0 22px 60px rgba(31, 50, 81, 0.13);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      height: 100%;
    }

    body {
      min-height: 100vh;
      overflow: hidden;
      font-family: Inter, ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 8% 0%, rgba(49, 87, 213, 0.10), transparent 30%),
        radial-gradient(circle at 95% 100%, rgba(13, 123, 114, 0.09), transparent 32%),
        var(--bg);
    }

    button,
    textarea {
      font: inherit;
    }

    .app-shell {
      width: min(1180px, calc(100% - 28px));
      height: calc(100vh - 28px);
      margin: 14px auto;
      display: grid;
      grid-template-rows: auto 1fr auto;
      overflow: hidden;
      border: 1px solid rgba(220, 229, 239, 0.95);
      border-radius: 24px;
      background: var(--surface);
      box-shadow: var(--shadow);
    }

    .topbar {
      min-height: 76px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
      padding: 14px 22px;
      border-bottom: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.96);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .brand-mark {
      width: 46px;
      height: 46px;
      display: grid;
      place-items: center;
      border-radius: 14px;
      color: white;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      box-shadow: 0 10px 26px rgba(49, 87, 213, 0.24);
      font-size: 0.84rem;
      font-weight: 900;
      letter-spacing: 0.04em;
    }

    .brand-copy {
      display: flex;
      flex-direction: column;
      line-height: 1.15;
    }

    .brand-copy strong {
      font-size: 1.05rem;
    }

    .brand-copy span {
      margin-top: 4px;
      color: var(--muted);
      font-size: 0.78rem;
      font-weight: 700;
    }

    .session-info {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 8px;
    }

    .session-pill {
      padding: 7px 10px;
      border: 1px solid var(--line);
      border-radius: 999px;
      color: #46566d;
      background: var(--surface-soft);
      font-size: 0.78rem;
      font-weight: 800;
    }

    .settings-link {
      display: inline-flex;
      align-items: center;
      padding: 7px 10px;
      border-radius: 999px;
      color: var(--primary-dark);
      background: #edf1ff;
      font-size: 0.78rem;
      font-weight: 850;
      text-decoration: none;
    }

    .conversation {
      min-height: 0;
      overflow-y: auto;
      padding: 28px clamp(18px, 4vw, 46px);
      background:
        linear-gradient(rgba(245, 248, 252, 0.88), rgba(245, 248, 252, 0.88)),
        radial-gradient(circle at 20% 10%, rgba(49, 87, 213, 0.08), transparent 28%);
      scroll-behavior: smooth;
    }

    .welcome {
      max-width: 660px;
      margin: 0 auto 26px;
      padding: 20px 22px;
      border: 1px solid var(--line);
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.86);
      text-align: center;
    }

    .welcome h1 {
      font-size: clamp(1.55rem, 3vw, 2.1rem);
      line-height: 1.15;
      letter-spacing: -0.03em;
    }

    .welcome p {
      margin-top: 9px;
      color: var(--muted);
      line-height: 1.6;
    }

    .message-row {
      width: 100%;
      display: flex;
      margin: 14px 0;
    }

    .message-row.user {
      justify-content: flex-end;
    }

    .message-row.assistant {
      justify-content: flex-start;
    }

    .message {
      max-width: min(760px, 82%);
      padding: 14px 17px;
      border-radius: 18px;
      box-shadow: 0 8px 24px rgba(31, 50, 81, 0.07);
      white-space: pre-wrap;
      overflow-wrap: anywhere;
      line-height: 1.55;
    }

    .message.user {
      border-bottom-right-radius: 6px;
      color: white;
      background: linear-gradient(135deg, var(--user-bubble), var(--primary-dark));
    }

    .message.assistant {
      border: 1px solid var(--line);
      border-bottom-left-radius: 6px;
      color: var(--text);
      background: var(--assistant-bubble);
    }

    .message-label {
      display: block;
      margin-bottom: 5px;
      font-size: 0.72rem;
      font-weight: 900;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      opacity: 0.72;
    }

    .message-content > * + * {
      margin-top: 10px;
    }

    .message-content h2,
    .message-content h3,
    .message-content h4 {
      line-height: 1.3;
      letter-spacing: -0.015em;
    }

    .message-content h2 {
      font-size: 1.12rem;
    }

    .message-content h3,
    .message-content h4 {
      font-size: 1.02rem;
    }

    .message-content ul,
    .message-content ol {
      padding-left: 22px;
    }

    .message-content li + li {
      margin-top: 6px;
    }

    .message-content strong {
      font-weight: 850;
    }

    .typing {
      color: var(--muted);
      font-style: italic;
    }

    .composer {
      padding: 16px 20px 18px;
      border-top: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.98);
    }

    .composer-inner {
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: end;
      gap: 12px;
      max-width: 980px;
      margin: 0 auto;
    }

    #besked {
      width: 100%;
      min-height: 54px;
      max-height: 180px;
      resize: vertical;
      padding: 14px 16px;
      border: 1px solid var(--line);
      border-radius: 15px;
      color: var(--text);
      background: var(--surface-soft);
      outline: none;
      line-height: 1.5;
      transition: border-color 150ms ease, box-shadow 150ms ease, background 150ms ease;
    }

    #besked:focus {
      border-color: var(--primary);
      background: white;
      box-shadow: 0 0 0 4px rgba(49, 87, 213, 0.11);
    }

    #besked::placeholder {
      color: #98a4b4;
    }

    #sendKnap {
      min-width: 118px;
      min-height: 54px;
      padding: 0 20px;
      border: 0;
      border-radius: 14px;
      color: white;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      box-shadow: 0 12px 26px rgba(49, 87, 213, 0.24);
      font-weight: 850;
      cursor: pointer;
      transition: transform 150ms ease, box-shadow 150ms ease, opacity 150ms ease;
    }

    #sendKnap:hover:not(:disabled) {
      transform: translateY(-1px);
      box-shadow: 0 15px 30px rgba(49, 87, 213, 0.30);
    }

    #sendKnap:disabled {
      cursor: wait;
      opacity: 0.66;
    }

    .composer-meta {
      max-width: 980px;
      min-height: 20px;
      margin: 7px auto 0;
      display: flex;
      justify-content: space-between;
      gap: 14px;
      color: var(--muted);
      font-size: 0.76rem;
    }

    #fejl {
      color: var(--danger);
      font-weight: 750;
    }

    #fejl:not(:empty) {
      padding: 6px 9px;
      border-radius: 8px;
      background: var(--danger-bg);
    }

    @media (max-width: 720px) {
      .app-shell {
        width: 100%;
        height: 100vh;
        margin: 0;
        border: 0;
        border-radius: 0;
      }

      .topbar {
        min-height: 68px;
        padding: 10px 14px;
      }

      .brand-copy span,
      .session-pill {
        display: none;
      }

      .conversation {
        padding: 20px 12px;
      }

      .message {
        max-width: 91%;
      }

      .composer {
        padding: 12px;
      }

      .composer-inner {
        grid-template-columns: 1fr;
      }

      #sendKnap {
        width: 100%;
      }

      .composer-meta {
        display: none;
      }
    }
  </style>
</head>

<body>
  <main class="app-shell">
    <header class="topbar">
      <div class="brand">
        <div class="brand-mark">CDAI</div>
        <div class="brand-copy">
          <strong>CDA</strong>
          <span>Children Diagnosis Adviser</span>
        </div>
      </div>

      <div class="session-info" aria-label="Aktuelle indstillinger">
        <span class="session-pill" id="rolleVisning"></span>
        <span class="session-pill" id="svarstilVisning"></span>
        <a class="settings-link" href="/cda.html">Skift indstillinger</a>
      </div>
    </header>

    <section id="chat" class="conversation" aria-live="polite">
      <div class="welcome" id="welcome">
        <h1>Hvad vil du gerne have hjælp til?</h1>
        <p>
          Beskriv en konkret situation, stil et spørgsmål eller bed CDA om en case,
          skabelon eller et praksisnært næste skridt.
        </p>
      </div>
    </section>

    <section class="composer" aria-label="Skriv til CDA">
      <div class="composer-inner">
        <textarea
          id="besked"
          placeholder="Skriv dit spørgsmål eller din situation her..."
          rows="3"
        ></textarea>

        <button id="sendKnap" type="button">Send</button>
      </div>

      <div class="composer-meta">
        <span>Enter sender · Shift + Enter laver ny linje</span>
        <p id="fejl" role="alert"></p>
      </div>
    </section>
  </main>

  <script>
    const adgangskode = localStorage.getItem("cda_adgangskode");
    const sprog = localStorage.getItem("cda_sprog");
    const rolle = localStorage.getItem("cda_rolle");
    const svarstil = localStorage.getItem("cda_response_style");

    const chat = document.getElementById("chat");
    const besked = document.getElementById("besked");
    const sendKnap = document.getElementById("sendKnap");
    const fejl = document.getElementById("fejl");
    const welcome = document.getElementById("welcome");
    const rolleVisning = document.getElementById("rolleVisning");
    const svarstilVisning = document.getElementById("svarstilVisning");

    let pendingAction = sessionStorage.getItem("cda_pending_action");

    if (!adgangskode || !sprog || !rolle || !svarstil) {
      window.location.href = "/cda.html";
    }

    rolleVisning.textContent = rolle || "";
    svarstilVisning.textContent = svarstil ? `Svar: ${svarstil}` : "";

    function scrollToBottom() {
      chat.scrollTop = chat.scrollHeight;
    }

    function appendInlineMarkdown(parent, text) {
      const parts = text.split(/(\*\*[^*]+\*\*)/g);

      parts.forEach((part) => {
        if (part.startsWith("**") && part.endsWith("**") && part.length > 4) {
          const strong = document.createElement("strong");
          strong.textContent = part.slice(2, -2);
          parent.appendChild(strong);
        } else if (part) {
          parent.appendChild(document.createTextNode(part));
        }
      });
    }

    function renderMarkdown(container, text) {
      const lines = String(text || "").replace(/\r\n/g, "\n").split("\n");
      let activeList = null;
      let activeListType = null;

      function closeList() {
        activeList = null;
        activeListType = null;
      }

      lines.forEach((rawLine) => {
        const line = rawLine.trim();

        if (!line) {
          closeList();
          return;
        }

        const headingMatch = line.match(/^(#{1,4})\s+(.+)$/);
        if (headingMatch) {
          closeList();
          const level = Math.min(4, Math.max(2, headingMatch[1].length + 1));
          const heading = document.createElement(`h${level}`);
          appendInlineMarkdown(heading, headingMatch[2]);
          container.appendChild(heading);
          return;
        }

        const numberedMatch = line.match(/^\d+[.)]\s+(.+)$/);
        if (numberedMatch) {
          if (!activeList || activeListType !== "ol") {
            activeList = document.createElement("ol");
            activeListType = "ol";
            container.appendChild(activeList);
          }

          const item = document.createElement("li");
          appendInlineMarkdown(item, numberedMatch[1]);
          activeList.appendChild(item);
          return;
        }

        const bulletMatch = line.match(/^[-*•]\s+(.+)$/);
        if (bulletMatch) {
          if (!activeList || activeListType !== "ul") {
            activeList = document.createElement("ul");
            activeListType = "ul";
            container.appendChild(activeList);
          }

          const item = document.createElement("li");
          appendInlineMarkdown(item, bulletMatch[1]);
          activeList.appendChild(item);
          return;
        }

        closeList();
        const paragraph = document.createElement("p");
        appendInlineMarkdown(paragraph, line);
        container.appendChild(paragraph);
      });
    }

    function appendMessage(type, text, extraClass = "") {
      const row = document.createElement("div");
      row.className = `message-row ${type}`;

      const bubble = document.createElement("div");
      bubble.className = `message ${type}${extraClass ? ` ${extraClass}` : ""}`;

      const label = document.createElement("span");
      label.className = "message-label";
      label.textContent = type === "user" ? "Dig" : "CDA";

      const content = document.createElement("div");
      content.className = "message-content";

      if (type === "assistant" && !extraClass.includes("typing")) {
        renderMarkdown(content, text);
      } else {
        content.textContent = text;
      }

      bubble.appendChild(label);
      bubble.appendChild(content);
      row.appendChild(bubble);
      chat.appendChild(row);

      scrollToBottom();
      return row;
    }

    async function sendMessage() {
      const tekst = besked.value.trim();

      if (!tekst || sendKnap.disabled) {
        if (!tekst) {
          fejl.textContent = "Skriv en besked først.";
        }
        return;
      }

      fejl.textContent = "";
      sendKnap.disabled = true;
      sendKnap.textContent = "Arbejder...";

      if (welcome) {
        welcome.remove();
      }

      appendMessage("user", tekst);
      besked.value = "";

      const typingRow = appendMessage("assistant", "CDA arbejder med dit spørgsmål...", "typing");

      try {
        const svar = await fetch("/api/cda-chat", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
          },
          body: JSON.stringify({
            message: tekst,
            language: sprog,
            role: rolle,
            response_style: svarstil,
            adgangskode,
            pending_action: pendingAction,
          }),
        });

        const data = await svar.json();

        typingRow.remove();

        if (!svar.ok) {
          fejl.textContent = data.error || "CDA kunne ikke svare.";
          return;
        }

        if (data.pending_action) {
          pendingAction = data.pending_action;
          sessionStorage.setItem("cda_pending_action", pendingAction);
        } else {
          pendingAction = null;
          sessionStorage.removeItem("cda_pending_action");
        }

        appendMessage("assistant", data.reply);
      } catch (error) {
        typingRow.remove();
        fejl.textContent = "Der opstod en forbindelsesfejl.";
      } finally {
        sendKnap.disabled = false;
        sendKnap.textContent = "Send";
        besked.focus();
      }
    }

    sendKnap.addEventListener("click", sendMessage);

    besked.addEventListener("keydown", (event) => {
      if (event.key === "Enter" && !event.shiftKey) {
        event.preventDefault();
        sendMessage();
      }
    });

    besked.focus();
  </script>
</body>
</html>
